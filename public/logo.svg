<!--?xml version="1.0" encoding="UTF-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="AzabPlex logo">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"></stop>
      <stop offset="1" stop-color="#22D3EE"></stop>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827"></stop>
      <stop offset="1" stop-color="#0B1220"></stop>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"></feDropShadow>
    </filter>
  </defs>

  <!-- Background (transparent by default) -->
  <rect width="1200" height="360" fill="none"></rect>

  <!-- Icon -->
  <g transform="translate(90,60)" filter="url(#softShadow)">
    <!-- Rounded square -->
    <rect x="0" y="0" width="240" height="240" rx="56" fill="url(#g2)"></rect>

    <!-- Film sprocket dots (subtle) -->
    <g opacity="0.35" fill="#9CA3AF">
      <!-- left column -->
      <circle cx="26" cy="48" r="5"></circle>
      <circle cx="26" cy="88" r="5"></circle>
      <circle cx="26" cy="128" r="5"></circle>
      <circle cx="26" cy="168" r="5"></circle>
      <circle cx="26" cy="208" r="5"></circle>
      <!-- right column -->
      <circle cx="214" cy="48" r="5"></circle>
      <circle cx="214" cy="88" r="5"></circle>
      <circle cx="214" cy="128" r="5"></circle>
      <circle cx="214" cy="168" r="5"></circle>
      <circle cx="214" cy="208" r="5"></circle>
    </g>

    <!-- Stylized "A" + play triangle -->
    <path d="M120 48 L182 200 H156 L140 162 H100 L84 200 H58 L120 48 Z
             M110 136 H130 L120 112 Z" fill="url(#g1)"></path>

    <!-- Play triangle cut-in (overlay) -->
    <path d="M136 118 L170 138 L136 158 Z" fill="#0B1220" opacity="0.85"></path>
  </g>

  <!-- Wordmark -->
  <g transform="translate(380,110)">
    <text x="0" y="85" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="96" font-weight="800" letter-spacing="-1.5" fill="#0B1220">
      Azab<tspan fill="url(#g1)">Plex</tspan>
    </text>

    <!-- Tagline (optional; remove if you want) -->
    <text x="2" y="132" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="22" font-weight="500" letter-spacing="2.2" fill="#6B7280">
      CINEMA • STREAM • EXPERIENCE
    </text>
  </g>
</svg>